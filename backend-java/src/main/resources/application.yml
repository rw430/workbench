server:
  port: 8889

spring:
  application:
    name: xiaoc-workbench-java
  datasource:
    url: ${XIAOC_DB_URL:jdbc:postgresql://localhost:5432/xiaoc_workbench}
    username: ${XIAOC_DB_USER:xiaoc}
    password: ${XIAOC_DB_PASSWORD:xiaoc}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
