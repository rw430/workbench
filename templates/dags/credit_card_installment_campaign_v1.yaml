id: credit_card_installment_campaign_v1
name: 信用卡分期活动配置与审批系统研发协同
mode: tasks
domain: banking_credit_card
nodes:
  - id: need_analysis
    name: 需求分析
    kind: LLM_PRD_DRAFT
    role: PD
    depends_on: []
  - id: human_gate_prd
    name: PRD 范围确认
    kind: HUMAN_GATE
    role: USER
    depends_on: [need_analysis]
  - id: risk_compliance_review
    name: 风险与合规评审
    kind: LLM_RISK_REVIEW
    role: RISK
    depends_on: [human_gate_prd]
  - id: tech_design
    name: 技术方案设计
    kind: LLM_TECH_DESIGN
    role: DEV
    depends_on: [risk_compliance_review]
  - id: test_plan
    name: 测试与验收方案
    kind: LLM_TEST_PLAN
    role: QA
    depends_on: [tech_design]
  - id: delivery_summary
    name: 交付汇总
    kind: DELIVERY_SUMMARY
    role: PMO
    depends_on: [test_plan]
  - id: reflection
    name: 任务复盘
    kind: REFLECTION
    role: PMO
    depends_on: [delivery_summary]
  - id: lessons_extract
    name: 经验沉淀
    kind: LESSONS_EXTRACT
    role: PMO
    depends_on: [reflection]
